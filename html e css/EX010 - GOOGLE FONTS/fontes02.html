<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
      @font-face {
    font-family: 'Love';
    src: url('fontes/love\ larry.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}
        /*
        Tipos de format()
        - opentype(otf)
        - true type (ttf)
        - embedded-opentype
        - true type-aat (Apple Advanced Typography)
        - svg
        */
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
       h1 {
    font-family: 'Love', sans-serif;
}
    </style>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Totam, voluptates facere adipisci quos distinctio eos ad reprehenderit, animi nam et architecto magni molestiae eius vitae a, nostrum eveniet ratione commodi.</p>
</body>
</html>
