<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        /* SELETORES PERSONALIZADOS
        # = id
        . = class
        : = pseudo-class
        :: = pseudo-element
        > = children
        
        
        
        
        
        */
body {
    font-family: Arial, Helvetica, sans-serif;
}
a {
    color: red;
    text-decoration: none;
    font-weight: bold;

}
a:visited {
    color: darkred;
}
a:hover {
    color: black;
    text-decoration: underline;
}
a:active {
    color: yellow;
}
a::before {
    content: ' ➡️';
}
a::after {
    content:  ' ⬅️';
    font-weight: normal;
    color: darkgrey;
}
.especial {
background-color: rgb(255, 140, 140);
color: white;
}
    </style>
</head>
<body>
   <h1>Personalizando Links</h1> 
   <ul>
       <li><a href="https://gustavoguanabara.github.io" target="_blank" rel="external"> Repositório GitHub</a></li>
       <li>canal do <a href="https://youtube.com/cursoemvideo" class="especial" target="_blank" rel="external">YouTube</a></li>
       <li>Site do <a href="https://cursoemvideo.com" class="especial" target="_blank" rel="external">Curso em Vídeo</a></li>
   </ul>




</body>
</html>
